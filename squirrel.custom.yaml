patch:
  show_notifications_when: appropriate # 状态通知，可设为全开（always）全关（never）  

  # 全局皮肤参数，不建议修改
  text_orientation: horizontal  # horizontal | vertical
  inline_preedit: true
  corner_radius: 10
  hilited_corner_radius: 0
  border_height: 0
  border_width: 0
  # space between candidates in stacked layout
  line_spacing: 5
  # space between preedit and candidates in non-inline mode
  spacing: 10
  #candidate_format: '%c. %@'
  #base_offset: 0
  font_face: 'Lucida Grande'
  font_point: 21
  #label_font_face: 'Lucida Grande'
  label_font_point: 18

  # 修改后面的名字更换皮肤
  style:
    color_scheme: macos_light
    color_scheme_dark: mritd_dark

  # 皮肤主题 
  preset_color_schemes:
    native:
      name: 系統配色

    macos_light:
      name: Mac仿原生亮色/macos_light
      author: 一方
      back_color: 0xFFFFFF      # 候选条背景色，24位色值，16进制，BGR顺序
      border_color: 0xFFFFFF    # 边框色
      text_color: 0x424242      # 拼音行文字颜色
      hilited_back_color: 0xD75A00    # 第一候选项背景背景色
      hilited_candidate_text_color: 0xFFFFFF    # 第一候选项文字颜色
      hilited_candidate_label_color: 0xFFFFFF   # 第一候选项编号颜色
      hilited_comment_text_color: 0x999999      # 注解文字高亮
      hilited_text_color: 0x999999    # 高亮拼音 (需要开启内嵌编码)
      candidate_text_color: 0x3c3c3c  # 预选项文字颜色
      comment_text_color: 0x999999    # 拼音等提示文字颜色
      horizontal: true        # 水平排列
      inline_preedit: true    # 单行显示，false双行显示
      label_color: 0x999999   # 预选栏编号颜色
      candidate_format: "%c\u2005%@"    # 用 1/6 em 空格 U+2005 来控制编号 %c 和候选词 %@ 前后的空间。
      font_face: "PingFangSC"           # 候选词编号字体
      font_point: 17          # 候选文字大小
      label_font_point: 13    # 候选编号大小
      corner_radius: 5        # 候选条圆角
      hilited_corner_radius: 5    # 高亮圆角
      border_height: 4        # 窗口上下高度
      border_width: 4         # 窗口左右宽度
      border_color_width: 0   # 输入条边框宽度
      #label_font_face: "SFCompactText-Regular"  # 候选词编号字体

    macos_dark:
      name: Mac仿原生暗色/macos_dark
      author: 一方
      back_color: 0x252a2e    # 候选条背景色，24位色值，16进制，BGR顺序
      border_color: 0x050505    # 边框色
      text_color: 0x424242    # 拼音行文字颜色
      hilited_back_color: 0xD75A00    # 第一候选项背景背景色
      hilited_candidate_text_color: 0xFFFFFF    # 第一候选项文字颜色
      hilited_candidate_label_color: 0xFFFFFF   # 第一候选项编号颜色
      hilited_comment_text_color: 0x999999    # 注解文字高亮
      hilited_text_color: 0x999999    # 高亮拼音 (需要开启内嵌编码)
      candidate_text_color: 0xe9e9ea    # 预选项文字颜色
      comment_text_color: 0x999999    # 拼音等提示文字颜色
      horizontal: true    # 水平排列
      inline_preedit: true    # 单行显示，false双行显示
      label_color: 0x999999   # 预选栏编号颜色
      candidate_format: "%c\u2005%@"    # 用 1/6 em 空格 U+2005 来控制编号 %c 和候选词 %@ 前后的空间。
      font_face: "PingFangSC"   # 候选词编号字体
      font_point: 17    # 候选文字大小
      label_font_point: 13    # 候选编号大小
      corner_radius: 5    # 候选条圆角
      hilited_corner_radius: 5    # 高亮圆角
      border_height: 4     # 窗口上下高度
      border_width: 4   # 窗口左右宽度
      border_color_width: 0   #输入条边框宽度
      #label_font_face: "SFCompactText-Regular"  # 候选词编号字体
  
    mritd_dark:
      # https://mritd.me/2019/03/23/oh-my-rime/
      name: 漠然／mritd dark
      author: mritd <mritd1234@gmail.com>
      horizontal: true                          # 水平排列
      inline_preedit: true                      # 单行显示，false双行显示
      candidate_format: "%c\u2005%@ \u2005"     # 用 1/6 em 空格 U+2005 来控制编号 %c 和候选词 %@ 前后的空间。
      corner_radius: 5                          # 候选条圆角
      hilited_corner_radius: 3                  # 高亮圆角
      border_height: 6                          # 窗口边界高度，大于圆角半径才生效
      border_width: 6                           # 窗口边界宽度，大于圆角半径才生效
      border_color_width: 0
      font_face: "PingFangSC"                  # 候选词字体
      #font_face: "YaHei Monaco Hybird"          # 候选词字体
      font_point: 16                            # 候选字词大小
      label_font_point: 14                      # 候选编号大小
      text_color: 0xdedddd                      # 拼音行文字颜色，24位色值，16进制，BGR顺序
      back_color: 0x4b4b4b                      # 候选条背景色
      label_color: 0x888785                     # 预选栏编号颜色
      border_color: 0x4b4b4b                    # 边框色
      candidate_text_color: 0xffffff            # 预选项文字颜色
      hilited_text_color: 0xdedddd              # 高亮拼音 (需要开启内嵌编码)
      hilited_back_color: 0x252320              # 高亮拼音 (需要开启内嵌编码)
      hilited_candidate_text_color: 0xFFE696    # 第一候选项文字颜色
      hilited_candidate_back_color: 0x4b4b4b    # 第一候选项背景背景色
      hilited_candidate_label_color: 0xffffff   # 第一候选项编号颜色
      comment_text_color: 0xdedddd              # 拼音等提示文字颜色

  app_options:    # App关闭中文输入, 右键『应用.app』-> 显示包内容 Contents/Info.plist -> BundleIdentifier
    com.apple.dt.Xcode:
      ascii_mode: true
    com.apple.Spotlight:
      ascii_mode: true
    com.apple.Terminal:
      ascii_mode: true
      no_inline: true
    com.googlecode.iterm2:
      ascii_mode: true
    com.runningwithcrayons.Alfred:
      ascii_mode: true
      no_inline: true
    com.google.Chrome:
      ascii_mode: true
      no_inline: true
    com.scitools.Understand:
      ascii_mode: true
    com.microsoft.VSCode:
      ascii_mode: true
    com.jetbrains.intellij:
      ascii_mode: true
    com.jetbrains.CLion:
      ascii_mode: true
    org.mozilla.firefox:
      ascii_mode: true
    com.DanPristupov.Fork:
      ascii_mode: true
    com.microsoft.edgemac:
      ascii_mode: true
    com.raycast.macos:
      ascii_mode: true



